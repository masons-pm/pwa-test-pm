name: Audit finding
description: Зафиксировать проблему/уязвимость, найденную в ходе аудита
labels: ["audit"]
body:
  - type: dropdown
    id: audit_type
    attributes:
      label: Тип аудита
      options:
        - UX (удобство)
        - Функциональность
        - Баг / узкое место
        - Процесс
  - type: textarea
    id: description
    attributes:
      label: Описание
      placeholder: Что найдено, как влияет на продукт...
  - type: textarea
    id: impact
    attributes:
      label: Влияние на метрики/пользователей
  - type: dropdown
    id: priority
    attributes:
      label: Приоритет
      options:
        - Critical (REC2DEP)
        - High
        - Medium
        - Low
  - type: dropdown
    id: team
    attributes:
      label: Команда
      options:
        - Backend (Марк)
        - Frontend (Макс)
        - DevOps/Support (Андрей)
