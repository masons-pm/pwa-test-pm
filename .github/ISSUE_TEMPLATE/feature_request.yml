name: Feature Request
description: Предложить новую функцию
title: "[FEATURE]: "
labels:
  - Feature
body:
  - type: input
    id: title
    attributes:
      label: Add a title
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Какую проблему решает?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Предлагаемое решение
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: dropdown
    id: team
    attributes:
      label: Команда
      options:
        - Backend
        - Frontend
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Дополнительная информация
