name: Feature request
description: Предложить новую функцию или улучшение
labels: ["enhancement"]
body:
  - type: input
    id: title
    attributes:
      label: Краткое описание
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Какую проблему решает?
      description: Опишите, с чем сейчас неудобно или что мешает
  - type: textarea
    id: solution
    attributes:
      label: Предлагаемое решение
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Приоритет
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: dropdown
    id: team
    attributes:
      label: Команда
      options:
        - Backend (Марк)
        - Frontend (Макс)
        - DevOps/Support (Андрей)
    validations:
      required: true
