name: Auto-label new issues

on:
  issues:
    types: [opened]

jobs:
  add-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Parse issue body and add labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          BODY="${{ github.event.issue.body }}"

          # Функция извлечения значения поля
          extract_field() {
            local field="$1"
            # Ищем строку с заголовком "### field"
            # Берём всё после заголовка, разбиваем на строки, ищем первую непустую
            echo "$BODY" | awk -v f="$field" '
              BEGIN { found=0; value="" }
              /^### '"$field"'$/ { found=1; next }
              found == 1 && /^[[:space:]]*$/ { next }
              found == 1 && /^[^#]/ { value=$0; exit }
              END { print value }
            ' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
          }

          PRIORITY=$(extract_field "Priority")
          TEAM=$(extract_field "Команда")

          LABELS=""

          case "$PRIORITY" in
            "Critical") LABELS="$LABELS Critical" ;;
            "High") LABELS="$LABELS High" ;;
            "Medium") LABELS="$LABELS Medium" ;;
            "Low") LABELS="$LABELS Low" ;;
          esac

          case "$TEAM" in
            "Backend") LABELS="$LABELS Backend" ;;
            "Frontend") LABELS="$LABELS Frontend" ;;
          esac

          if [ -n "$LABELS" ]; then
            echo "Adding labels: $LABELS"
            gh issue edit $ISSUE_NUMBER --add-label "$LABELS"
          fi

          # Опционально: назначить assignee
          ASSIGNEE=""
          case "$TEAM" in
            "Backend") ASSIGNEE="masons-pm" ;;   # замените на реальный логин
            "Frontend") ASSIGNEE="masons-pm" ;;
          esac
          if [ -n "$ASSIGNEE" ]; then
            gh issue edit $ISSUE_NUMBER --add-assignee "$ASSIGNEE"
          fi
